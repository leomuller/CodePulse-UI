<div class="container">
	<h2 class="mt-3">Category List</h2>

	<div class="d-flex justify-content-end mt-3">
		<a [routerLink]="['/admin', 'categories', 'add']" class="btn btn-primary">Add Category</a>
	</div>

	<div>
		@if (isLoading() )
		{
		<p>Loading data...</p>
		}
		@else {
		@if (isError()) {
		<p class="text-danger">Error loading categories.</p>
		}
		@else {

		<table class="table table-bordered mt-3">
			<thead>
				<tr>
					<th>ID</th>
					<th>Name</th>
					<th>UrlHandle</th>
					<th>Edit</th>
					<th>Delete</th>
				</tr>
			</thead>
			<tbody>
				@for (category of value(); track category.id ) {
				<tr>
					<td>{{category.id}}</td>
					<td>{{category.name}}</td>
					<td>{{category.urlHandle}}</td>
					<td>

						<a [routerLink]="['/admin/categories/edit', category.id]" class="btn btn-light">Edit</a>
					</td>
					<td>
						&nbsp;
					</td>
				</tr>

				}
			</tbody>
		</table>


		}
		}
	</div>


</div>
